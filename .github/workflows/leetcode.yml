name: Sync LeetCode

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios fs

      - name: Fetch and Save LeetCode Submissions
        run: |
          node <<EOF
          const fs = require('fs');

          // Dummy file (for now just to test commits)
          const date = new Date().toISOString();
          fs.writeFileSync('leetcode-log.txt', 'Updated at: ' + date);
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Sync LeetCode"
          git push
